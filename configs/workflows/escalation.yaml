name: escalation
description: Escalation path for harmless memory analysis and meta-skill drafting.
initial_stage: escalation_memory

skill_groups:
  memory:
    - memory-summarize
  analysis:
    - retrieval-analysis
  meta:
    - refine-skill
    - combine-skills
    - discover-skill
  return_search:
    - rewrite-char
    - rewrite-emoji
    - rewrite-history
    - rewrite-hypo
    - rewrite-language
    - rewrite-literary
    - rewrite-reverse
    - rewrite-security
    - rewrite-space
    - rewrite-word

policy:
  repeated_failure_threshold: 2
  return_stage: escalation_return

conditions:
  repeated_failures:
    source: consecutive_failures
    op: ">="
    value: 2
